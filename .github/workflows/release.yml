name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # macos-latest (currently arm64 Apple Silicon) + windows-latest.
        # We drop the Intel-mac target — every Mac sold since late 2020
        # is Apple Silicon, so an arm64-only DMG keeps CI fast and avoids
        # the cross-arch node-gyp/distutils flakiness we hit on v0.1.0-1.
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Python 3.12+ removed distutils — node-gyp (used by electron-rebuild
      # when building pcsclite) still imports it. Pin 3.11 so the bundled
      # stdlib carries distutils. Applies on every OS for consistency.
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        # No lockfile in the repo (bun-only locally), so install fresh —
        # npm install avoids the setup-node `cache: npm` requirement.
        run: npm install --no-audit --no-fund

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild

      - name: Build TypeScript
        run: npm run build

      - name: Package + publish (macOS)
        if: startsWith(matrix.os, 'macos')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple Developer ID configured yet — skip code signing.
          # Users will need to right-click → Open on first launch.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --publish always

      - name: Package + publish (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
