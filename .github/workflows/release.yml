name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # macOS dropped 2026-05-28: hdiutil + distutils issues on the
        # GitHub-hosted arm64 runner break pcsclite/electron-builder.
        # Windows is the primary target — re-add macos-13 (intel) once
        # we have a fix for the native rebuild.
        os: [windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux PC/SC deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev

      - name: Install
        # No lockfile in the repo (we use bun locally), so install from
        # package.json fresh — npm install is fine for CI and avoids
        # the setup-node `cache: npm` requirement.
        run: npm install --no-audit --no-fund

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild

      - name: Build TypeScript
        run: npm run build

      - name: Package + publish (macOS)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --publish always

      - name: Package + publish (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
