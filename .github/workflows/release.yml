name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # macos-13 (Intel) instead of macos-latest (arm64): arm64 runner
        # 2026-05-28 broke pcsclite + hdiutil. Revisit when GH stabilises.
        os: [windows-latest, macos-13]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Python 3.12+ removed distutils. node-gyp still needs it for native
      # rebuilds — point it at a Python with setuptools (provides a
      # distutils shim). Pin 3.11 for safety on Mac runners.
      - name: Set up Python (macOS)
        if: matrix.os == 'macos-13'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux PC/SC deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev

      - name: Install
        # No lockfile in the repo (we use bun locally), so install from
        # package.json fresh — npm install is fine for CI and avoids
        # the setup-node `cache: npm` requirement.
        run: npm install --no-audit --no-fund

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild

      - name: Build TypeScript
        run: npm run build

      - name: Package + publish (macOS)
        if: matrix.os == 'macos-13'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --publish always

      - name: Package + publish (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
